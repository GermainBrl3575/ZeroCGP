name: Update Market Data Weekly

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

# ← C'EST LE FIX : donner explicitement le droit d'écrire dans le repo
permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch Yahoo Finance data
        run: python scripts/update_market_data.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet lib/marketData.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.email "bot@zerocgp.capital"
          git config user.name "Zero CGP Bot"
          git add lib/marketData.ts
          git commit -m "Update market data $(date +'%Y-%m-%d')"
          git push
