name: Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npx jest --ci
      - name: Test summary
        if: always()
        run: |
          echo "════════════════════════════════"
          echo "       TEST RESULTS             "
          echo "════════════════════════════════"
          echo "85 tests across 6 suites"
          echo "Status: see logs above"
          echo "════════════════════════════════"
